{% extends 'base.html' %}

{% block titulo %}Confirmar eliminación{% endblock %}

{% block contenido %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card text-center p-4">
            <div class="mb-3">
                <i class="bi bi-exclamation-triangle-fill display-3 text-danger"></i>
            </div>
            <h4 class="fw-bold mb-2">¿Estás segura?</h4>
            <p class="text-muted mb-4">
                Vas a eliminar <strong>{{ objeto }}</strong>. Esta acción no se puede deshacer.
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash me-1"></i>Sí, eliminar
                    </button>
                    <a href="{% url cancelar_url pk %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
